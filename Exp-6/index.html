<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>Mídias em HTML</title>
</head>

<body>
    <h1>Imagem dinâmica</h1>
    <p>Tente abrir esse site em vários dispositivos diferentes ou simlpesmente aumente e diminua o tamanho do navegador
    </p>
    <picture>
        <source media="(max-width: px)" srcset="img/foto-p.png" type="image">
        <source media="(max-width: px)" srcset="img/foto-m.png" type="image">
        <img src="img/foto-g.png" alt="">
    </picture>

    <h1>Reproduzindo áudios</h1>
    <p>Vamos aprender a </p>
    <audio preload="metadata" autoplay controls loop>
        <source src="midia/guanacast-33.mp3" type="audio/mepg">
        <source src="midia/guanacast-33.ogg" type="audio/ogg">
        <source src="midia/guanacast-33.wav" type="audio/wav">
        <p>Infelizmente seu navegador não consegue reproduzir áudio</p>
        <p>
            <a href="midia/guanacast-33.mp3">Clique aqui para baixar o arquivo mp3</a>
        </p>
    </audio>
